    <!-- Tailwind CSS (Para los estilos) -->

    <!-- Babel (Para compilar JSX en el navegador) -->

</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- ICONOS SVG INTEGRADOS ---
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const svgProps = { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className };
            switch(name) {
                case 'home': return <svg {...svgProps}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
                case 'layers': return <svg {...svgProps}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;
                case 'target': return <svg {...svgProps}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
                case 'folder': return <svg {...svgProps}><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>;
                case 'file': return <svg {...svgProps}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>;
                case 'map': return <svg {...svgProps}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>;
                case 'help': return <svg {...svgProps}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>;
                case 'database': return <svg {...svgProps}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>;
                case 'chart': return <svg {...svgProps}><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>;
                case 'lock': return <svg {...svgProps}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
                case 'leaf': return <svg {...svgProps}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><line x1="2" x2="11" y1="22" y2="13"/></svg>;
                case 'water': return <svg {...svgProps}><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 2.99 7 2.99s-2.29 6.07-2.29 6.07A4.46 4.46 0 0 0 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/></svg>;
                case 'wind': return <svg {...svgProps}><path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/></svg>;
                case 'globe': return <svg {...svgProps}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>;
                case 'settings': return <svg {...svgProps}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
                case 'monitor': return <svg {...svgProps}><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>;
                case 'chevron-right': return <svg {...svgProps}><polyline points="9 18 15 12 9 6"/></svg>;
                case 'maximize': return <svg {...svgProps}><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" x2="14" y1="3" y2="10"/><line x1="3" x2="10" y1="21" y2="14"/></svg>;
                default: return <svg {...svgProps}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>;
            }
        };

        // --- DATOS DE LA ESTRUCTURA ---
        const siteData = {
          id: "root", name: "OAR Home", path: "/", depth: 1, icon: "home",
          children: [
            { 
              id: "hero-preguntas", name: "Sección: Preguntas Estratégicas", depth: 2, icon: "layers",
              children: [
                { id: "hp-1-card", name: "Clic en: ¿Cómo vamos con la meta 30x30?", depth: 3, icon: "help", children: [{ id: "hp-1-visor", name: "Visor Final: Meta 30x30", path: "/preguntas/meta-30x30", depth: 4, icon: "monitor" }] },
                { id: "hp-2-card", name: "Clic en: ¿Qué especies hay registradas?", depth: 3, icon: "help", children: [{ id: "hp-2-visor", name: "Visor Final: Registros de Especies", path: "/preguntas/registros-especies", depth: 4, icon: "monitor" }] },
                { id: "hp-3-card", name: "Clic en: ¿Qué áreas están protegidas?", depth: 3, icon: "help", children: [{ id: "hp-3-visor", name: "Visor Final: Áreas Protegidas", path: "/preguntas/areas-protegidas", depth: 4, icon: "monitor" }] },
                { id: "hp-4-card", name: "Clic en: ¿Nuestros océanos se calientan?", depth: 3, icon: "help", children: [{ id: "hp-4-visor", name: "Visor Final: Salud de Océanos", path: "/preguntas/salud-oceanos", depth: 4, icon: "monitor" }] },
                { id: "hp-5-card", name: "Clic en: ¿Qué tan segura es nuestra agua?", depth: 3, icon: "help", children: [{ id: "hp-5-visor", name: "Visor Final: Seguridad Hídrica", path: "/preguntas/seguridad-hidrica", depth: 4, icon: "monitor" }] },
                { id: "hp-6-card", name: "Clic en: ¿Cómo están los bosques?", depth: 3, icon: "help", children: [{ id: "hp-6-visor", name: "Visor Final: Estado de Bosques", path: "/preguntas/estado-bosques", depth: 4, icon: "monitor" }] },
                { id: "hp-7-card", name: "Clic en: ¿Dónde y cuánto bosque perdemos?", depth: 3, icon: "help", children: [{ id: "hp-7-visor", name: "Visor Final: Pérdida de Bosque", path: "/preguntas/perdida-bosque", depth: 4, icon: "monitor" }] },
                { id: "hp-8-card", name: "Clic en: ¿Donde hay incendios activos?", depth: 3, icon: "help", children: [{ id: "hp-8-visor", name: "Visor Final: Incendios Activos", path: "/preguntas/incendios-activos", depth: 4, icon: "monitor" }] },
                { id: "hp-9-card", name: "Clic en: ¿Riesgo de sequía en Corredor Seco?", depth: 3, icon: "help", children: [{ id: "hp-9-visor", name: "Visor Final: Riesgo de Sequía", path: "/preguntas/riesgo-sequia", depth: 4, icon: "monitor" }] }
              ]
            },
            { 
              id: "cifras", name: "Sección: Cifras Regionales", depth: 2, icon: "layers",
              children: [{ id: "cifras-visor", name: "Visor Final: Dashboard de Cifras", path: "/data/cifras", depth: 3, icon: "monitor" }]
            },
            {
              id: "ejes", name: "Explorar por ejes ERAM", depth: 2, icon: "layers",
              children: [
                { id: "l1", name: "Landing Eje 1: Calidad Ambiental", path: "/strategic-axis/calidad", depth: 3, icon: "target" },
                {
                  id: "l2", name: "Landing Eje 2: Mares y Biodiversidad", path: "/strategic-axis/mares", depth: 3, icon: "globe",
                  children: [
                    {
                      id: "l2-preg", name: "Sección: Preguntas Críticas", path: "/strategic-questions", depth: 4, icon: "help",
                      children: [
                        { id: "l2-p1", name: "Visor Final: Meta 30x30", path: "/preguntas/meta-30x30", depth: 5, icon: "monitor" },
                        { id: "l2-p2", name: "Visor Final: Especies Registradas", path: "/preguntas/registros-especies", depth: 5, icon: "monitor" },
                        { id: "l2-p3", name: "Visor Final: Áreas Protegidas", path: "/preguntas/areas-protegidas", depth: 5, icon: "monitor" },
                        { id: "l2-p4", name: "Visor Final: Salud de Océanos", path: "/preguntas/salud-oceanos", depth: 5, icon: "monitor" },
                      ]
                    }
                  ]
                },
                {
                  id: "l3", name: "Landing Eje 3: Gestión Hídrica", path: "/strategic-axis/agua", depth: 3, icon: "water",
                  children: [
                    {
                      id: "l3-preg", name: "Sección: Preguntas Críticas", path: "/strategic-questions", depth: 4, icon: "help",
                      children: [{ id: "l3-p1", name: "Visor Final: Seguridad Hídrica", path: "/preguntas/seguridad-hidrica", depth: 5, icon: "monitor" }]
                    }
                  ]
                },
                {
                  id: "l4", name: "Landing Eje 4: Bosques y Paisajes", path: "/strategic-axis/bosques", depth: 3, icon: "leaf",
                  children: [
                    {
                      id: "l4-preg", name: "Sección: Preguntas Críticas", path: "/strategic-questions", depth: 4, icon: "help",
                      children: [
                        { id: "l4-p1", name: "Visor Final: Estado de Bosques", path: "/preguntas/estado-bosques", depth: 5, icon: "monitor" },
                        { id: "l4-p2", name: "Visor Final: Pérdida de Bosque", path: "/preguntas/perdida-bosque", depth: 5, icon: "monitor" },
                        { id: "l4-p3", name: "Visor Final: Incendios Activos", path: "/preguntas/incendios-activos", depth: 5, icon: "monitor" },
                      ]
                    },
                    {
                      id: "l4-hist-landing", name: "Sección: Grandes Bosques de la Región", path: "/grandes-bosques", depth: 4, icon: "folder",
                      children: [
                        { id: "l4-h1-landing", name: "Visor Final: Montañas Mayas", path: "/grandes-bosques/historias/montanas-mayas", depth: 5, icon: "monitor" },
                        { id: "l4-h2-landing", name: "Visor Final: Biosfera Maya", path: "/grandes-bosques/historias/reserva-de-la-biosfera-maya", depth: 5, icon: "monitor" },
                        { id: "l4-h3-landing", name: "Visor Final: El Imposible", path: "/grandes-bosques/historias/parque-nacional-el-imposible", depth: 5, icon: "monitor" },
                        { id: "l4-h4-landing", name: "Visor Final: Río Plátano", path: "/grandes-bosques/historias/reserva-de-la-biosfera-del-rio-platano", depth: 5, icon: "monitor" },
                        { id: "l4-h5-landing", name: "Visor Final: Darién", path: "/grandes-bosques/historias/parque-nacional-darien", depth: 5, icon: "monitor" },
                      ]
                    }
                  ]
                },
                {
                  id: "l5", name: "Landing Eje 5: Cambio Climático", path: "/strategic-axis/clima", depth: 3, icon: "wind",
                  children: [
                    {
                      id: "l5-preg", name: "Sección: Preguntas Críticas", path: "/strategic-questions", depth: 4, icon: "help",
                      children: [{ id: "l5-p1", name: "Visor Final: Riesgo de Sequía", path: "/preguntas/riesgo-sequia", depth: 5, icon: "monitor" }]
                    }
                  ]
                }
              ]
            },
            {
              id: "reportes", name: "Sección: Reportes Temáticos", depth: 2, icon: "layers",
              children: [
                {
                  id: "l4-hist", name: "Colección: Grandes Bosques", path: "/grandes-bosques", depth: 3, icon: "folder",
                  children: [
                    { id: "l4-h1", name: "Visor Final: Montañas Mayas", path: "/grandes-bosques/historias/montanas-mayas", depth: 4, icon: "monitor" },
                    { id: "l4-h2", name: "Visor Final: Biosfera Maya", path: "/grandes-bosques/historias/reserva-de-la-biosfera-maya", depth: 4, icon: "monitor" },
                    { id: "l4-h3", name: "Visor Final: El Imposible", path: "/grandes-bosques/historias/parque-nacional-el-imposible", depth: 4, icon: "monitor" },
                    { id: "l4-h4", name: "Visor Final: Río Plátano", path: "/grandes-bosques/historias/reserva-de-la-biosfera-del-rio-platano", depth: 4, icon: "monitor" },
                    { id: "l4-h5", name: "Visor Final: Darién", path: "/grandes-bosques/historias/parque-nacional-darien", depth: 4, icon: "monitor" },
                  ]
                }
              ]
            },
            { 
              id: "bi", name: "Sección: Análisis Multidimensional", depth: 2, icon: "layers",
              children: [{ id: "bi-visor", name: "Visor Final: Dashboard BI", path: "/analisis-multidimensional", depth: 3, icon: "monitor" }]
            },
            { 
              id: "geo", name: "Sección: Análisis Geoespacial Avanzado", depth: 2, icon: "layers",
              children: [{ id: "geo-visor", name: "Visor Final: Laboratorio", path: "/technical/geo-analysis", depth: 3, icon: "monitor" }]
            },
            { 
              id: "visor", name: "Sección: Visor Geoespacial Regional", depth: 2, icon: "layers",
              children: [{ id: "mapas-visor", name: "Visor Final: Explorador Mapas", path: "/technical/maps", depth: 3, icon: "monitor" }]
            },
            {
              id: "plataforma", name: "Plataforma Adaptativa", depth: 2, icon: "settings",
              children: [
                {
                  id: "ic3", name: "Módulo: Monitoreo Regional", path: "/monitoring", depth: 3, icon: "chart",
                  children: [
                    { id: "ic3-1", name: "Visor Final: Monitoreo Estratégico", path: "/monitoring/strategic", depth: 4, icon: "monitor" },
                    { id: "ic3-2", name: "Visor Final: Monitoreo Operativo", path: "/monitoring/operational", depth: 4, icon: "monitor" },
                  ]
                },
                { id: "in1", name: "Portal: Acceso Funcionarios", path: "/auth/login", depth: 3, icon: "lock" }
              ]
            },
            {
              id: "otros", name: "Otros Recursos Técnicos", depth: 2, icon: "folder",
              children: [
                { id: "t3", name: "Portal: Centro de Documentación", path: "/technical/docs", depth: 3, icon: "folder" },
                { id: "t4", name: "Portal: Desarrolladores", path: "/technical/developers", depth: 3, icon: "settings" },
              ]
            }
          ]
        };

        // --- UTILIDADES ---
        const getDepthStyle = (depth) => {
          switch(depth) {
            case 1: return "bg-indigo-700 text-indigo-50 border-indigo-800 shadow-md";
            case 2: return "bg-blue-600 text-blue-50 border-blue-700 shadow-md";
            case 3: return "bg-sky-50 text-sky-900 border-sky-300 shadow-sm hover:bg-sky-100";
            case 4: return "bg-amber-50 text-amber-900 border-amber-300 shadow-sm hover:bg-amber-100";
            case 5: return "bg-emerald-50 text-emerald-900 border-emerald-300 shadow-sm hover:bg-emerald-100";
            default: return "bg-gray-100 text-gray-800 border-gray-300";
          }
        };

        const getBadgeStyle = (depth) => {
          switch(depth) {
            case 1: return "bg-indigo-900 text-indigo-100";
            case 2: return "bg-blue-800 text-blue-100";
            case 3: return "bg-sky-200 text-sky-800";
            case 4: return "bg-amber-200 text-amber-800";
            case 5: return "bg-emerald-200 text-emerald-800";
            default: return "bg-gray-200 text-gray-800";
          }
        };

        const flattenData = (node, parentName = "Ninguno") => {
          let result = [];
          const current = { ...node, parentName };
          result.push(current);
          if (node.children) {
              node.children.forEach(child => {
                  result = result.concat(flattenData(child, node.name));
              });
          }
          return result;
        }

        // --- COMPONENTES PRINCIPALES ---
        const NodeCard = ({ node }) => (
          <div className={`flex flex-col p-3 rounded-lg border transition-all duration-200 w-[260px] ${getDepthStyle(node.depth)}`}>
            <div className="flex justify-between items-start gap-2 mb-2">
              <div className="flex items-center gap-2">
                <div className="opacity-80 shrink-0">
                  <Icon name={node.icon} />
                </div>
                <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wide shrink-0 ${getBadgeStyle(node.depth)}`}>
                  Nvl {node.depth}
                </span>
              </div>
            </div>
            
            <h4 className="font-bold text-sm leading-tight mb-1">{node.name}</h4>
            
            {node.path && (
              <p className="text-[11px] font-mono opacity-75 truncate" title={node.path}>
                {node.path}
              </p>
            )}
          </div>
        );

        const TreeNodeHorizontal = ({ node }) => {
          const [isOpen, setIsOpen] = useState(false);
          const hasChildren = node.children && node.children.length > 0;

          return (
            <div className="flex flex-row items-center">
              <div className="relative shrink-0 z-10 py-1 group">
                <div 
                  onClick={() => setIsOpen(!isOpen)} 
                  className={`transition-transform duration-200 ${hasChildren ? "cursor-pointer hover:scale-[1.02]" : ""}`}
                >
                  <NodeCard node={node} />
                </div>
                
                {hasChildren && (
                  <button 
                    onClick={() => setIsOpen(!isOpen)}
                    className={`absolute -right-3 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full bg-white border border-slate-300 shadow flex items-center justify-center transition-all z-20 hover:bg-slate-50 hover:border-indigo-400 text-slate-500 hover:text-indigo-600 ${isOpen ? '' : 'rotate-180'}`}
                    title={isOpen ? "Colapsar sección" : "Expandir sección"}
                  >
                    <Icon name="chevron-right" />
                  </button>
                )}
              </div>

              {hasChildren && isOpen && (
                <div className="flex flex-row items-center animate-in fade-in slide-in-from-left-4 duration-300">
                  <div className="w-8 h-px bg-slate-300 shrink-0"></div>
                  
                  <div className="flex flex-col gap-3 relative py-2">
                    {node.children.map((child, index) => {
                      const isFirst = index === 0;
                      const isLast = index === node.children.length - 1;
                      const isOnly = node.children.length === 1;

                      return (
                        <div key={child.id} className="relative flex items-center">
                          {!isOnly && (
                            <div className={`absolute -left-8 w-px bg-slate-300
                              ${isFirst ? 'top-1/2 bottom-0' : ''}
                              ${isLast ? 'top-0 h-1/2' : ''}
                              ${!isFirst && !isLast ? 'top-0 bottom-0' : ''}
                            `}></div>
                          )}
                          <div className="absolute -left-8 top-1/2 w-8 h-px bg-slate-300"></div>
                          <TreeNodeHorizontal node={child} />
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        };

        const App = () => {
          const [viewMode, setViewMode] = useState('horizontal');
          const flatNodes = flattenData(siteData);
          const getDepthNodes = (depthNum) => flatNodes.filter(n => n.depth === depthNum);

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 font-sans flex flex-col">
              <header className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                <div className="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                      <h1 className="text-2xl font-black text-slate-800 tracking-tight">OAR Flujo de Navegación</h1>
                      <p className="text-sm text-slate-500 mt-1">Esquema horizontal para visualizar los niveles de profundidad (clics)</p>
                    </div>
                    
                    <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200 w-fit shrink-0">
                      <button 
                        onClick={() => setViewMode('horizontal')}
                        className={`px-4 py-2 text-sm font-semibold rounded-md transition-all flex items-center gap-2 ${viewMode === 'horizontal' ? 'bg-white shadow text-indigo-700' : 'text-slate-600 hover:text-slate-900'}`}
                      >
                        <Icon name="maximize" /> Flujo Horizontal
                      </button>
                      <button 
                        onClick={() => setViewMode('columns')}
                        className={`px-4 py-2 text-sm font-semibold rounded-md transition-all flex items-center gap-2 ${viewMode === 'columns' ? 'bg-white shadow text-indigo-700' : 'text-slate-600 hover:text-slate-900'}`}
                      >
                        <Icon name="layers" /> Agrupado por Nivel
                      </button>
                    </div>
                  </div>
                  
                  <div className="mt-4 flex flex-wrap gap-4 items-center text-xs md:text-sm border-t border-slate-100 pt-3">
                    <span className="font-bold text-slate-700 mr-2 uppercase tracking-wide text-xs">Niveles de Clics:</span>
                    <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-indigo-700"></div> Nivel 1</div>
                    <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-blue-600"></div> Nivel 2</div>
                    <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-sky-200"></div> Nivel 3</div>
                    <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-amber-200"></div> Nivel 4</div>
                    <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-emerald-200"></div> Nivel 5</div>
                  </div>
                </div>
              </header>

              <main className="flex-1 overflow-auto p-4 sm:p-8 bg-slate-50/50">
                <div className="min-w-max h-full">
                  {viewMode === 'horizontal' ? (
                    <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm inline-block min-w-full">
                      <TreeNodeHorizontal node={siteData} />
                    </div>
                  ) : (
                    <div className="flex gap-6 pb-8">
                      {[1, 2, 3, 4, 5].map((level) => (
                        <div key={level} className="flex flex-col gap-4 w-[260px] shrink-0">
                          <div className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm sticky top-0 z-10">
                            <h3 className="font-bold text-slate-800 flex justify-between items-center">
                              Nivel {level}
                              <span className="text-xs font-normal text-slate-500 bg-slate-100 px-2 py-1 rounded-full">{getDepthNodes(level).length} páginas</span>
                            </h3>
                          </div>
                          
                          <div className="flex flex-col gap-3">
                            {getDepthNodes(level).map((node) => (
                              <div key={node.id} className="relative group">
                                {node.depth > 1 && (
                                  <div className="text-[10px] text-slate-400 font-semibold mb-1 ml-1 flex items-center gap-1 uppercase tracking-wider">
                                    <Icon name="chevron-right" className="w-3 h-3" /> De: {node.parentName}
                                  </div>
                                )}
                                <NodeCard node={node} />
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
